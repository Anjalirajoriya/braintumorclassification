<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Result</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <div class="container">
    <h1>🧠 Prediction Result</h1>
    <img src="/{{ image_url }}" alt="MRI scan" class="preview"/>

    {% if error %}
    <div class="error-box">
      <h2>{{ label }}</h2>
      <p>{{ error }}</p>
      <a href="{{ url_for('index') }}" class="btn">Try Again</a>
    </div>

    {% else %}
    <div class="result-box">
      <h2>{{ label }}</h2>
      <p>Confidence: <strong>{{ confidence }}%</strong></p>
    </div>
    <h3>All Predictions</h3>
    <ul class="prob-list">
      {% for name, score in top3 %}
      <li>
        <span class="label-name">{{ name }}</span>
        <div class="bar-wrap">
          <div class="bar" style="width: {{ score }}%"></div>
        </div>
        <span class="score">{{ score }}%</span>
      </li>
      {% endfor %}
    </ul>
    <a href="{{ url_for('index') }}" class="btn">Try Another Image</a>
    {% endif %}
  </div>
</body>
</html>
